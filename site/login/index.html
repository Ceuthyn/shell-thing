<!DOCTYPE html>
<html>
	<head>
		<title>
			login
		</title>
		<script src="./login.js" defer></script>
		<link rel="stylesheet" href="./style.css">
	</head>
	<body>
		<div id="main">
			<h1>login</h1>
			<span id="err"></span>
			<label for="username">username</label>

		<div id="register">
			<label for="reg">register instead</label>
			<button id="reg" type="button">register</button>
		</div>
	</body>
</html>
